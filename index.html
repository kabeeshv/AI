<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>வாய்ஸ் AI · Voice AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Tamil:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --accent: #e85d3a;
    --accent2: #f5a623;
    --gold: #c9a84c;
    --text: #f0ece4;
    --muted: #7a7585;
    --user-bubble: #1e1e2e;
    --ai-bubble: #181824;
    --glow: rgba(232, 93, 58, 0.25);
    --glow2: rgba(245, 166, 35, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', 'Noto Sans Tamil', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 70%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(232,93,58,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 16px;
  }

  /* Header */
  header {
    padding: 32px 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 24px var(--glow);
  }

  .logo-text {
    display: flex;
    flex-direction: column;
  }

  .logo-text .en {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.1;
    background: linear-gradient(135deg, #f0ece4 40%, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-text .ta {
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    color: var(--muted);
    transition: all 0.3s;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }

  .status-pill.listening .status-dot {
    background: #4ade80;
    box-shadow: 0 0 8px rgba(74,222,128,0.6);
    animation: pulse-dot 1.2s ease-in-out infinite;
  }

  .status-pill.listening {
    border-color: rgba(74,222,128,0.2);
    color: #4ade80;
  }

  .status-pill.speaking .status-dot {
    background: var(--accent2);
    box-shadow: 0 0 8px rgba(245,166,35,0.6);
    animation: pulse-dot 0.8s ease-in-out infinite;
  }

  .status-pill.speaking {
    border-color: rgba(245,166,35,0.2);
    color: var(--accent2);
  }

  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.7; }
  }

  /* Chat container */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  /* Welcome state */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    gap: 16px;
  }

  .welcome-icon {
    font-size: 48px;
    margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .welcome h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--text) 40%, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome .sub {
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 380px;
  }

  .lang-tags {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  .lang-tag {
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
  }

  /* Messages */
  .message {
    display: flex;
    gap: 12px;
    animation: slide-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.user .avatar {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
  }

  .message.ai .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 16px var(--glow);
  }

  .bubble-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 72%;
  }

  .message.user .bubble-wrap { align-items: flex-end; }

  .bubble {
    padding: 13px 17px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.65;
    font-family: 'DM Sans', 'Noto Sans Tamil', sans-serif;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(99,102,241,0.2);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    padding: 0 4px;
  }

  .lang-badge {
    padding: 2px 8px;
    background: var(--surface2);
    border-radius: 100px;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 12px;
    animation: slide-in 0.35s ease;
  }

  .typing-dots {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
  }

  .typing-dots span {
    width: 6px;
    height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Live transcript */
  .live-transcript {
    padding: 12px 18px;
    background: rgba(232,93,58,0.05);
    border: 1px solid rgba(232,93,58,0.15);
    border-radius: 14px;
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
    animation: slide-in 0.2s ease;
    text-align: center;
    font-family: 'Noto Sans Tamil', 'DM Sans', sans-serif;
  }

  /* Controls */
  .controls {
    padding: 20px 0 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    border-top: 1px solid var(--border);
  }

  .mic-btn {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    background: linear-gradient(135deg, var(--accent), #c94820);
    box-shadow: 0 0 0 0 var(--glow), 0 8px 24px rgba(0,0,0,0.4);
    outline: none;
  }

  .mic-btn:hover:not(:disabled) { transform: scale(1.07); }
  .mic-btn:active:not(:disabled) { transform: scale(0.95); }
  .mic-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .mic-btn.listening {
    background: linear-gradient(135deg, #4ade80, #22c55e);
    animation: mic-pulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(74,222,128,0.4), 0 8px 24px rgba(0,0,0,0.4);
  }

  @keyframes mic-pulse {
    0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.4), 0 8px 24px rgba(0,0,0,0.4); }
    70% { box-shadow: 0 0 0 18px rgba(74,222,128,0), 0 8px 24px rgba(0,0,0,0.4); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0), 0 8px 24px rgba(0,0,0,0.4); }
  }

  /* Ring animations */
  .mic-btn::before, .mic-btn::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(74,222,128,0.4);
    opacity: 0;
    pointer-events: none;
  }

  .mic-btn.listening::before {
    width: 100px;
    height: 100px;
    animation: ring 1.5s ease-out infinite;
  }

  .mic-btn.listening::after {
    width: 130px;
    height: 130px;
    animation: ring 1.5s ease-out infinite 0.5s;
  }

  @keyframes ring {
    0% { transform: scale(0.8); opacity: 0.6; }
    100% { transform: scale(1.2); opacity: 0; }
  }

  .btn-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-align: center;
    font-family: 'Noto Sans Tamil', 'DM Sans', sans-serif;
  }

  .action-row {
    display: flex;
    gap: 10px;
  }

  .action-btn {
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    border-radius: 100px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .action-btn:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
    background: var(--surface2);
  }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2d1a1a;
    border: 1px solid rgba(232,93,58,0.3);
    color: #ff9080;
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Scrollbar for chrome */
  .chat-area::-webkit-scrollbar { width: 3px; }

  /* Responsive */
  @media (max-width: 500px) {
    .bubble-wrap { max-width: 85%; }
    .welcome h2 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🎙️</div>
      <div class="logo-text">
        <span class="en">Voice AI</span>
        <span class="ta">குரல் உதவியாளர்</span>
      </div>
    </div>
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">Ready</span>
    </div>
  </header>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Hello · வணக்கம்</h2>
      <p class="sub">Speak to me in Tamil or English. I'll understand, respond, and speak back in your language.</p>
      <div class="lang-tags">
        <span class="lang-tag">🇮🇳 தமிழ்</span>
        <span class="lang-tag">🇬🇧 English</span>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="mic-btn" id="micBtn" onclick="toggleListening()" title="Click to speak">🎤</button>
    <div class="btn-label" id="btnLabel">Tap to speak · பேச தட்டவும்</div>
    <div class="action-row">
      <button class="action-btn" onclick="clearChat()">🗑 Clear chat</button>
      <button class="action-btn" onclick="stopSpeaking()">🔇 Stop voice</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let recognition = null;
let isListening = false;
let isSpeaking = false;
let conversationHistory = [];
let liveTranscriptEl = null;
let typingEl = null;

// ─── Tamil detection ─────────────────────────────────────────────────────────
function detectLanguage(text) {
  const tamilRange = /[\u0B80-\u0BFF]/;
  if (tamilRange.test(text)) return 'ta';
  // Heuristic: common Tamil words in Roman script
  const tamilRoman = /\b(naan|nee|avan|aval|avanga|enna|epdi|sollu|theriyum|illai|vanakkam|romba|paaru|vaa|po|da|di|macha|anna|akka|appa|amma|yenna|unakku|enakku|solren|paren|varen|konduvaren)\b/i;
  if (tamilRoman.test(text)) return 'ta';
  return 'en';
}

// ─── Speech Recognition ───────────────────────────────────────────────────────
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('Speech Recognition not supported. Use Chrome.');
    return false;
  }

  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;
  // 'ta-IN' causes 'service-not-allowed' on many mobile devices (especially iOS).
  // Falling back to 'en-US' ensures broad compatibility for the Speech Recognition service.
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isListening = true;
    updateUI();
    showLiveTranscript('🎙️ Listening…');
  };

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    if (interim) showLiveTranscript('🎙️ ' + interim);
    if (final) {
      removeLiveTranscript();
      if (typeof handleUserInput === 'function') {
        handleUserInput(final.trim());
      }
    }
  };

  recognition.onerror = (e) => {
    removeLiveTranscript();
    isListening = false;
    updateUI();
    
    console.warn('Speech Recognition Error:', e.error);
    if (e.error === 'not-allowed') {
      showToast('Microphone access denied. Please allow mic in settings.');
    } else if (e.error === 'service-not-allowed') {
      showToast('Speech service not allowed. Try checking your internet or using Chrome.');
    } else if (e.error === 'no-speech') {
      showToast('No speech detected. Try again.');
    } else {
      showToast('Error: ' + e.error);
    }
  };

  recognition.onend = () => {
    isListening = false;
    removeLiveTranscript();
    updateUI();
  };

  return true;
}

function toggleListening() {
  if (isSpeaking) { stopSpeaking(); return; }
  if (isListening) {
    if (recognition) recognition.stop();
    return;
  }

  if (!recognition) {
    if (!initRecognition()) return;
  }

  try {
    // Avoid aborting right before starting to preserve the native user gesture context on iOS
    recognition.start();
  } catch (err) {
    console.warn('Speech start error:', err.message);
    try {
      recognition.abort();
      setTimeout(() => { if (!isListening) recognition.start(); }, 50);
    } catch (e) {
      showToast('Mic error: ' + e.message);
    }
  }
}

// ─── Handle user input ────────────────────────────────────────────────────────
async function handleUserInput(text) {
  if (!text) return;

  const lang = detectLanguage(text);
  addMessage('user', text, lang);
  hideWelcome();

  showTyping();
  setStatus('thinking');

  try {
    const response = await callClaudeAPI(text, lang);
    removeTyping();
    addMessage('ai', response, lang);
    speakText(response, lang);
  } catch (err) {
    removeTyping();
    const errMsg = lang === 'ta'
      ? 'மன்னிக்கவும், பதில் கிடைக்கவில்லை. மீண்டும் முயற்சிக்கவும்.'
      : 'Sorry, I could not get a response. Please try again.';
    addMessage('ai', errMsg, lang);
    speakText(errMsg, lang);
  }
}

// ─── Claude API (via Backend) ───────────────────────────────────────────────────
// Set this to your deployed backend URL in production (e.g., 'https://my-voice-backend.onrender.com/api/chat')
const BACKEND_URL = 'http://localhost:3000/api/chat';

async function callClaudeAPI(userText, lang) {
  const systemPrompt = lang === 'ta'
    ? `நீங்கள் ஒரு அன்பான, புத்திசாலியான AI உதவியாளர். பயனர் தமிழில் பேசுகிறார், எனவே நீங்கள் **தமிழில் மட்டுமே** பதில் சொல்லவும். பதில்கள் இயல்பாகவும், சுருக்கமாகவும் (2-3 வாக்கியங்கள்), உதவியாகவும் இருக்க வேண்டும். தமிழ் எழுத்துக்களில் பதிலளிக்கவும்.`
    : `You are a warm, intelligent AI assistant. The user is speaking in English, so reply in **English only**. Keep responses natural, concise (2-3 sentences), helpful, and conversational. Avoid markdown formatting.`;

  // Build conversation context (last 6 turns)
  const messages = conversationHistory.slice(-6).map(m => ({
    role: m.role === 'user' ? 'user' : 'assistant',
    content: m.text
  }));
  messages.push({ role: 'user', content: userText });

  // Call our secure backend instead of Anthropic directly
  const res = await fetch(BACKEND_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      systemText: systemPrompt,
      messages: messages
    })
  });

  if (!res.ok) {
    const errData = await res.json().catch(() => ({}));
    throw new Error(errData.error || ('API error ' + res.status));
  }
  
  const data = await res.json();
  return data.reply;
}

// ─── Text-to-Speech ───────────────────────────────────────────────────────────
function speakText(text, lang) {
  if (!window.speechSynthesis) return;
  stopSpeaking();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang === 'ta' ? 'ta-IN' : 'en-US';
  utter.rate = 0.92;
  utter.pitch = 1.05;
  utter.volume = 1;

  // Pick best voice
  const voices = speechSynthesis.getVoices();
  let preferred;
  if (lang === 'ta') {
    preferred = voices.find(v => v.lang.startsWith('ta'));
  } else {
    preferred = voices.find(v => v.lang === 'en-US' && v.name.includes('Natural'))
      || voices.find(v => v.lang === 'en-US' && !v.name.includes('Google'))
      || voices.find(v => v.lang.startsWith('en'));
  }
  if (preferred) utter.voice = preferred;

  utter.onstart = () => { isSpeaking = true; setStatus('speaking'); };
  utter.onend = () => { isSpeaking = false; setStatus('ready'); };
  utter.onerror = () => { isSpeaking = false; setStatus('ready'); };

  speechSynthesis.speak(utter);
}

function stopSpeaking() {
  if (window.speechSynthesis) speechSynthesis.cancel();
  isSpeaking = false;
  setStatus('ready');
}

// ─── UI helpers ───────────────────────────────────────────────────────────────
function addMessage(role, text, lang) {
  const chatArea = document.getElementById('chatArea');

  conversationHistory.push({ role, text, lang });

  const langLabel = lang === 'ta' ? 'Tamil' : 'English';
  const avatar = role === 'user' ? '🧑' : '🤖';
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  const el = document.createElement('div');
  el.className = 'message ' + role;
  el.innerHTML = `
    <div class="avatar">${avatar}</div>
    <div class="bubble-wrap">
      <div class="bubble" style="font-family:'Noto Sans Tamil','DM Sans',sans-serif">${escapeHtml(text)}</div>
      <div class="meta">
        <span>${time}</span>
        <span class="lang-badge">${langLabel}</span>
      </div>
    </div>`;

  chatArea.appendChild(el);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showLiveTranscript(text) {
  const chatArea = document.getElementById('chatArea');
  if (!liveTranscriptEl) {
    liveTranscriptEl = document.createElement('div');
    liveTranscriptEl.className = 'live-transcript';
    chatArea.appendChild(liveTranscriptEl);
  }
  liveTranscriptEl.textContent = text;
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeLiveTranscript() {
  if (liveTranscriptEl) {
    liveTranscriptEl.remove();
    liveTranscriptEl = null;
  }
}

function showTyping() {
  const chatArea = document.getElementById('chatArea');
  typingEl = document.createElement('div');
  typingEl.className = 'typing-indicator';
  typingEl.innerHTML = `
    <div class="avatar" style="background:linear-gradient(135deg,#e85d3a,#f5a623);box-shadow:0 0 16px rgba(232,93,58,.25)">🤖</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>`;
  chatArea.appendChild(typingEl);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function clearChat() {
  stopSpeaking();
  conversationHistory = [];
  const chatArea = document.getElementById('chatArea');
  chatArea.innerHTML = `<div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <h2>Hello · வணக்கம்</h2>
    <p class="sub">Speak to me in Tamil or English. I'll understand, respond, and speak back in your language.</p>
    <div class="lang-tags">
      <span class="lang-tag">🇮🇳 தமிழ்</span>
      <span class="lang-tag">🇬🇧 English</span>
    </div>
  </div>`;
}

function setStatus(state) {
  const pill = document.getElementById('statusPill');
  const txt = document.getElementById('statusText');
  pill.className = 'status-pill';
  if (state === 'listening') {
    pill.classList.add('listening');
    txt.textContent = 'Listening…';
  } else if (state === 'speaking') {
    pill.classList.add('speaking');
    txt.textContent = 'Speaking…';
  } else if (state === 'thinking') {
    txt.textContent = 'Thinking…';
  } else {
    txt.textContent = 'Ready';
  }
}

function updateUI() {
  const btn = document.getElementById('micBtn');
  const label = document.getElementById('btnLabel');
  if (isListening) {
    btn.classList.add('listening');
    btn.textContent = '⏹';
    label.textContent = 'Listening… tap to stop · நிறுத்த தட்டவும்';
    setStatus('listening');
  } else {
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    label.textContent = 'Tap to speak · பேச தட்டவும்';
    setStatus('ready');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Load voices early
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());
}

// Check browser support on load
window.addEventListener('load', () => {
  if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
    showToast('⚠️ Speech not supported. Please use Chrome browser.');
    document.getElementById('micBtn').disabled = true;
  }
});
</script>
</body>
</html>
